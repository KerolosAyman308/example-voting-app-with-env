apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: result
  name: result
spec:
  replicas: 2
  selector:
    matchLabels:
      app: result
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: result
    spec:
      initContainers:
        - name: init-databases
          image: busybox
          command:
            - sh
            - "-c"
            - |
              until nc -z db-0.db-service 5432; do
                sleep 2;
              done;
              echo "Database is up"
      containers:
        - image: kerolosayman308/voting-app-env:examplevotingapp_result
          name: result
          ports:
            - containerPort: 80
          env:
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  key: DB_URL_NODE_JS
                  name: apps-db-secret
          resources:
            requests:
              cpu: "0.5"
              memory: 100Mi
