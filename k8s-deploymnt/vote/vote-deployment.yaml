apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: vote
  name: vote
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vote
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: vote
    spec:
      initContainers:
        - name: init-databases
          image: busybox
          command:
            - sh
            - "-c"
            - |
              until nc -z redis-0.redis-service 6379; do
                sleep 2;
              done;
              echo "Cache is up"
      containers:
        - image: kerolosayman308/voting-app-env:examplevotingapp_vote
          name: vote
          imagePullPolicy: Always
          command:
            - sh
            - "-c"
            - "python app.py"
          ports:
            - containerPort: 80
          envFrom:
            - secretRef:
                name: apps-cache-secret
          resources:
            requests:
              cpu: "0.5"
              memory: 100Mi
