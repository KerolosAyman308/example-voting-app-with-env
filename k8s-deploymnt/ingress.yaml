apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-voting-prefixes
spec:
  stripPrefix:
    prefixes:
      - /vote
      - /result
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: voting-ingress
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: voting-strip-voting-prefixes@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /vote
            pathType: Prefix
            backend:
              service:
                name: vote-service
                port:
                  number: 8080
          - path: /result
            pathType: Prefix
            backend:
              service:
                name: result-service
                port:
                  number: 8081
