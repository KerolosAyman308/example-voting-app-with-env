apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: worker
  name: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: worker
    spec:
      initContainers:
        - name: init-databases
          image: busybox
          restartPolicy: Never
          command:
            - sh
            - "-c"
            - |
              until ns -z redis-0.redis-service 6379; do
                sleep 2;
              done;
              echo "Redis is up"
              until ns -z db-0.db-service 5432; do
                sleep 2;
              done;
              echo "Database is up"
      containers:
        - image: dockersamples/examplevotingapp_worker
          name: worker
          resources:
            requests:
              cpu: 0.5m
              memory: 100Mi
