apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-voting-prefixes
spec:
  stripPrefix:
    prefixes:
      - /{{ .Values.ingress.votePath | default "votes" }}
      - /{{ .Values.ingress.resultPath | default "result" }}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: force-vote-prefix
spec:
  redirectRegex:
    regex: "^(https?://[^/]+)/(.*)"
    replacement: "${1}/{{ .Values.ingress.votePath | default "votes" }}/${2}"

---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: force-result-prefix
spec:
  redirectRegex:
    regex: "^(https?://[^/]+)/(.*)"
    replacement: "${1}/{{ .Values.ingress.resultPath | default "result" }}/${2}"

---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: voting-ingressroute
spec:
  entryPoints:
    - web
  routes:
    - match: PathPrefix(`/socket.io`)
      kind: Rule
      services:
        - name: result-service
          port: 8081
          sticky:
            cookie:
              name: socketio_sticky_session
              httpOnly: true

    - match: PathPrefix(`/{{ .Values.ingress.votePath | default "votes" }}`)
      kind: Rule
      services:
        - name: vote-service
          port: 8080
          sticky:
            cookie:
              name: vote_sticky_session
      middlewares:
        - name: strip-voting-prefixes

    - match: HeaderRegexp(`Referer`, `.*/{{ .Values.ingress.votePath | default "votes" }}.*`) && !PathPrefix(`/{{ .Values.ingress.votePath | default "votes" }}`) && !PathPrefix(`/{{ .Values.ingress.resultPath | default "result" }}`) && !PathPrefix(`/socket.io`)
      kind: Rule
      services:
        - name: vote-service
          port: 8080
      middlewares:
        - name: force-vote-prefix

    - match: PathPrefix(`/{{ .Values.ingress.resultPath | default "result" }}`)
      kind: Rule
      services:
        - name: result-service
          port: 8081
          sticky:
            cookie:
              name: socketio_sticky_session
              httpOnly: true
      middlewares:
        - name: strip-voting-prefixes

    - match: HeaderRegexp(`Referer`, `.*/{{ .Values.ingress.resultPath | default "result" }}.*`) && !PathPrefix(`/{{ .Values.ingress.votePath | default "votes" }}`) && !PathPrefix(`/{{ .Values.ingress.resultPath | default "result" }}`) && !PathPrefix(`/socket.io`)
      kind: Rule
      services:
        - name: result-service
          port: 8081
      middlewares:
        - name: force-result-prefix
