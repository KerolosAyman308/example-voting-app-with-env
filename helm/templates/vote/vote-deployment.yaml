apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: vote
  name: vote
spec:
  # Gently corrected: mapped to .replicas instead of .image
  replicas: {{ .Values.vote.pod.replicaCount | default 2 }}
  selector:
    matchLabels:
      app: vote
  strategy:  
  {{- if .Values.result.pod.strategy }}
    {{- toYaml .Values.result.pod.strategy | nindent 4 }}
  {{- else }}
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  {{- end }}
  template:
    metadata:
      labels:
        app: vote
    spec:
      initContainers:
        - name: init-databases
          image: busybox
          command:
            - sh
            - "-c"
            - |
              until nc -z redis-0.redis-service 6379; do
                sleep 2;
              done;
              echo "Cache is up"
      containers:
        - name: vote
          image: {{ .Values.vote.pod.image | default "kerolosayman308/voting-app-env:examplevotingapp_vote" }}
          imagePullPolicy: {{ .Values.vote.pod.imagePullPolicy | default "IfNotPresent" }}
          command:
            - sh
            - "-c"
            - "python app.py"
          ports:
            - containerPort: 80
          env:
            - name: CACHE_URL
              {{- if .Values.vote.pod.env.cacheUrl.value }}
              value: {{ .Values.vote.pod.env.cacheUrl.value | quote }}

              {{- else if .Values.vote.pod.env.cacheUrl.valueFrom }}
              valueFrom:
                {{- toYaml .Values.vote.pod.env.cacheUrl.valueFrom | nindent 16 }}
              {{- else }}
              valueFrom:
                secretKeyRef:
                  name: apps-cache-secret
                  key: CACHE_URL
              {{- end }}

            {{- if .Values.vote.pod.env.extraEnv }}
            {{- toYaml .Values.vote.pod.env.extraEnv | nindent 12 }}
            {{- end }}
          
          resources:
            requests:
              cpu: {{ .Values.vote.pod.requests.cpu | default "100m" }}
              memory: {{ .Values.vote.pod.requests.memory | default "100Mi" }}
            {{- if .Values.vote.pod.limits.enabled }}
            limits:
              cpu: {{ .Values.vote.pod.limits.cpu }}
              memory: {{ .Values.vote.pod.limits.memory }}
            {{- end }}